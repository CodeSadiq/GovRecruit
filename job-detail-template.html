<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Detail | India Government Jobs Portal</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700&family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a2b5e;
            --primary-dark: #121e42;
            --accent: #f59e0b;
            --success: #059669;
            --danger: #dc2626;
            --bg: #f8f9fa;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --border: #e5e7eb;
            --card-bg: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            line-height: 1.6;
            padding-bottom: 40px;
        }

        h1, h2, h3, h4, .font-heading {
            font-family: 'Poppins', sans-serif;
        }

        .container {
            max-width: 860px;
            margin: 0 auto;
            padding: 0 15px;
        }

        /* Section 0: Top Alert Bar */
        .top-alert {
            background-color: var(--primary);
            color: white;
            padding: 8px 0;
            font-size: 13px;
            font-weight: 600;
        }
        .top-alert .flex-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Section 1: Hero */
        .hero-card {
            background: white;
            padding: 30px;
            margin-top: 20px;
            border-radius: 12px;
            border-left: 6px solid var(--primary);
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .badge-type {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 99px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 12px;
            color: white;
        }

        .badge-type.central { background-color: #3b82f6; }
        .badge-type.state { background-color: #6366f1; }
        .badge-type.psu { background-color: #14b8a6; }
        .badge-type.banking { background-color: #10b981; }
        .badge-type.defence { background-color: #84cc16; }
        .badge-type.other { background-color: #64748b; }

        .job-title {
            font-size: 28px;
            color: var(--primary);
            line-height: 1.2;
            margin-bottom: 8px;
            font-weight: 800;
        }

        .org-name {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-main);
        }

        .dept-name {
            font-size: 15px;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        .advt-badge {
            font-family: monospace;
            background: #f1f5f9;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            border: 1px solid var(--border);
        }

        .vacancy-pill {
            display: inline-block;
            background: var(--accent);
            color: #000;
            padding: 6px 16px;
            border-radius: 99px;
            font-weight: 800;
            font-size: 16px;
            margin: 15px 0;
            box-shadow: 0 2px 4px rgba(245, 158, 11, 0.2);
        }

        .tag-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 15px;
        }

        .tag {
            background-color: #f3f4f6;
            color: #4b5563;
            font-size: 11px;
            padding: 2px 10px;
            border-radius: 4px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .short-info {
            background-color: #eff6ff;
            border: 1px solid #bfdbfe;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 14px;
            color: #1e40af;
        }

        /* Generic Section Card */
        .section-card {
            background: white;
            margin-top: 25px;
            border-radius: 12px;
            border-left: 6px solid var(--primary);
            overflow: hidden;
            box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
        }

        .section-header {
            background: #f8fafc;
            padding: 15px 20px;
            border-bottom: 1px solid var(--border);
            font-size: 18px;
            font-weight: 700;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .section-content {
            padding: 20px;
        }

        /* Tables */
        .table-wrapper {
            overflow-x: auto;
            margin-bottom: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 14px;
        }

        th {
            background: #f1f5f9;
            padding: 12px 15px;
            font-weight: 700;
            border: 1px solid var(--border);
            color: var(--primary);
        }

        td {
            padding: 12px 15px;
            border: 1px solid var(--border);
        }

        .table-striped tr:nth-child(even) {
            background: #fcfcfc;
        }

        .highlight-accent {
            background-color: #fffbeb;
            font-weight: 700;
        }

        .deadline-red {
            color: var(--danger);
            font-weight: 700;
        }

        .badge-status {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            text-transform: uppercase;
            font-weight: 700;
            margin-left: 8px;
        }

        .badge-status.red { background: #fee2e2; color: #991b1b; }
        .badge-status.gray { background: #f3f4f6; color: #374151; }

        /* Buttons */
        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 700;
            text-decoration: none;
            text-align: center;
            font-size: 15px;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn-green {
            background-color: var(--success);
            color: white;
        }
        .btn-green:hover { background-color: #047857; }

        .btn-outline {
            border: 2px solid var(--primary);
            color: var(--primary);
        }
        .btn-outline:hover { background-color: #f1f5f9; }

        .btn-amber {
            background-color: var(--accent);
            color: #000;
        }

        /* Summary Bar */
        .summary-bar {
            display: flex;
            background: #f1f5f9;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        .summary-item {
            flex: 1;
            padding: 10px;
            text-align: center;
            border-right: 1px solid var(--border);
        }
        .summary-item:last-child { border-right: none; }
        .summary-label { font-size: 10px; text-transform: uppercase; font-weight: 700; color: var(--text-muted); }
        .summary-value { font-size: 16px; font-weight: 800; color: var(--primary); }

        /* Qualification Cards */
        .qual-card {
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 12px;
            background: #fff;
        }
        .qual-badge {
            background: var(--primary);
            color: white;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 700;
            margin-right: 10px;
        }
        .qual-name { font-weight: 700; font-size: 16px; }
        .qual-branches { color: var(--text-muted); font-size: 14px; margin-top: 5px; }
        .warning-row {
            display: flex;
            gap: 8px;
            font-size: 13px;
            color: #b45309;
            background: #fffbeb;
            padding: 4px 10px;
            border-radius: 4px;
            margin-top: 8px;
            font-weight: 600;
        }

        /* Accordion */
        .accordion-item { border-bottom: 1px solid var(--border); }
        .accordion-header {
            padding: 15px 20px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 700;
            transition: background 0.2s;
        }
        .accordion-header:hover { background: #f8fafc; }
        .accordion-content {
            display: none;
            padding: 20px;
            background: #fafafa;
        }
        .accordion-item.active .accordion-content { display: block; }
        .accordion-item.active .chevron { transform: rotate(180deg); }

        /* Age/Fee Icons */
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        /* Selection Steps */
        .step-flow {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        .step-pill {
            background: white;
            border: 2px solid var(--primary);
            padding: 8px 16px;
            border-radius: 99px;
            font-weight: 700;
            font-size: 13px;
            color: var(--primary);
            position: relative;
        }
        .step-arrow { color: var(--text-muted); font-weight: bold; }

        /* Application Steps */
        .app-step {
            display: flex;
            gap: 20px;
            padding: 15px 0;
            border-bottom: 1px dashed var(--border);
        }
        .app-step:last-child { border-bottom: none; }
        .step-num {
            font-size: 24px;
            font-weight: 800;
            color: #e2e8f0;
            min-width: 40px;
        }
        .step-text { font-size: 14px; font-weight: 500; }

        /* Footer */
        .footer-slim {
            margin-top: 40px;
            border-top: 1px solid var(--border);
            padding-top: 20px;
            text-align: center;
            font-size: 12px;
            color: var(--text-muted);
        }

        .footer-links {
            margin-top: 10px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }
        .footer-links a { color: var(--primary); text-decoration: none; font-weight: 700; }

        /* Print Styles */
        @media print {
            .top-alert, .btn-group, .footer-links { display: none !important; }
            body { background: white; padding: 0; }
            .container { max-width: 100%; }
            .section-card { box-shadow: none; border: 1px solid #ccc; break-inside: avoid; }
            .accordion-content { display: block !important; }
            .chevron { display: none; }
        }

        /* Mobile */
        @media (max-width: 600px) {
            .info-grid { grid-template-columns: 1fr; }
            .flex-row { flex-direction: column; gap: 5px; text-align: center; }
            .job-title { font-size: 22px; }
            .btn { width: 100%; }
        }
    </style>
</head>
<body>

<div id="job-page-container">
    <!-- Will be populated by JS -->
</div>

<script>
    function formatDate(dateStr) {
        if (!dateStr) return "—";
        const d = new Date(dateStr);
        if (isNaN(d.getTime())) return dateStr;
        return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'long', year: 'numeric' });
    }

    function formatDateTime(dateStr) {
        if (!dateStr) return "—";
        const d = new Date(dateStr);
        if (isNaN(d.getTime())) return dateStr;
        const date = d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
        const time = d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
        return `${date}, ${time}`;
    }

    function formatCurrency(num) {
        if (num === null || num === undefined) return "—";
        return new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR', maximumFractionDigits: 0 }).format(num);
    }

    function getQualLabel(level) {
        const levels = {
            1: "10th",
            2: "12th / Intermediate",
            3: "Diploma / ITI / Certificate",
            4: "Graduate (Degree)",
            5: "Post Graduate (Master's)",
            6: "PhD / Doctorate"
        };
        return levels[level] || `Level ${level}`;
    }

    function renderJob(job) {
        const container = document.getElementById('job-page-container');
        
        // Date Logic Check
        const today = new Date();
        const lastDateObj = job.importantDates.lastDate ? new Date(job.importantDates.lastDate) : null;
        let deadlineClass = "";
        let deadlineBadge = "";
        
        if (lastDateObj) {
            const diffDays = Math.ceil((lastDateObj - today) / (1000 * 60 * 60 * 24));
            if (diffDays < 0) {
                deadlineBadge = '<span class="badge-status red">❌ Closed</span>';
            } else if (diffDays <= 7) {
                deadlineClass = "deadline-red";
                deadlineBadge = '<span class="badge-status red">⚠️ Closing Soon</span>';
            }
        }

        let html = '';

        // SECTION 0: Top Alert Bar
        html += `
        <div class="top-alert">
            <div class="container flex-row">
                <span>🇮🇳 India Government Jobs Portal</span>
                <span>Post Date: ${formatDate(job.updatedAt || job.createdAt)}</span>
            </div>
        </div>`;

        // SECTION 1: Hero
        const typeClass = (job.type || '').toLowerCase().replace(/\s+/g, '-');
        html += `
        <div class="container">
            <div class="hero-card">
                <span class="badge-type ${typeClass}">${job.type || 'Other'}</span>
                <h1 class="job-title">${job.title}</h1>
                <div class="org-name">${job.organization}</div>
                ${job.department ? `<div class="dept-name">${job.department}</div>` : ''}
                ${job.advertisementNumber ? `<div class="advt-badge">Advt No. ${job.advertisementNumber}</div>` : ''}
                
                <div class="vacancy-pill">${job.totalVacancy || '—'} Vacancies</div>
                
                <div class="tag-row">
                    ${(job.tags || []).map(t => `<span class="tag">${t}</span>`).join('')}
                </div>

                ${job.shortInfo ? `
                <div class="short-info">
                    <strong>ℹ️ Short Information:</strong> ${job.shortInfo}
                </div>` : ''}
            </div>`;

        // SECTION 2: Important Dates
        const dates = job.importantDates;
        const dateRows = [
            { label: "Notification Released", val: dates.notificationRelease },
            { label: "Application Start Date", val: dates.startDate, force: true },
            { label: "Last Date to Apply", val: dates.lastDate, force: true, extra: deadlineBadge, cls: deadlineClass },
            { label: "Fee Payment Last Date", val: dates.feePaymentLastDate },
            { label: "Correction Window Closes", val: dates.correctionWindowLastDate },
            { label: "Admit Card Available", val: dates.admitCardDate },
            { label: "Exam Date", val: dates.examDate },
            { label: "Result Date", val: dates.resultDate },
            { label: "Interview Date", val: dates.interviewDate },
            { label: "Document Verification", val: dates.documentVerificationDate }
        ].filter(r => r.force || r.val !== null);

        html += `
        <div class="section-card">
            <div class="section-header">⚠️ Important Dates</div>
            <div class="section-content">
                <div class="table-wrapper">
                    <table class="table-striped">
                        <thead>
                            <tr><th>Event</th><th>Date</th></tr>
                        </thead>
                        <tbody>
                            ${dateRows.map(r => `
                                <tr>
                                    <td>${r.label}</td>
                                    <td class="${r.cls || ''}">${formatDate(r.val)} ${r.extra || ''}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>

                <div class="btn-group">
                    ${job.applyLink ? `<a href="${job.applyLink}" target="_blank" class="btn btn-green">Apply Online →</a>` : ''}
                    ${job.notificationPdfLink ? `<a href="${job.notificationPdfLink}" target="_blank" class="btn btn-outline">Download Notification PDF</a>` : ''}
                    ${(!job.applyLink && !job.notificationPdfLink && job.officialWebsite) ? `<a href="${job.officialWebsite}" target="_blank" class="btn btn-amber">Visit Official Website →</a>` : ''}
                </div>
            </div>
        </div>`;

        // SECTION 3: Vacancy Details
        // 3A Breakdown
        const catTotal = job.categoryWiseVacancyTotal || {};
        const hasCatTotal = Object.values(catTotal).some(v => v !== null);

        if (hasCatTotal || (job.posts && job.posts.length > 0)) {
            html += `
            <div class="section-card">
                <div class="section-header">Vacancy Details</div>
                <div class="section-content">
                    ${hasCatTotal ? `
                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>General</th><th>EWS</th><th>OBC</th><th>SC</th><th>ST</th><th>PWD</th><th class="highlight-accent">Total</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td>${catTotal.general ?? '—'}</td>
                                    <td>${catTotal.ews ?? '—'}</td>
                                    <td>${catTotal.obc ?? '—'}</td>
                                    <td>${catTotal.sc ?? '—'}</td>
                                    <td>${catTotal.st ?? '—'}</td>
                                    <td>${catTotal.pwd ?? '—'}</td>
                                    <td class="highlight-accent">${job.totalVacancy ?? '—'}</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>` : ''}

                    <!-- 3B Post Table -->
                    ${job.posts && job.posts.length > 0 ? `
                    <div class="table-wrapper" style="margin-top: 20px;">
                        <table class="table-striped">
                            <thead>
                                <tr>
                                    <th>Post Name</th><th>Vacancies</th><th>Min. Qualification</th><th>Prerequisite</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${job.posts.map((p, i) => `
                                    <tr>
                                        <td><a href="#post-detail-${i}" style="color: var(--primary); text-decoration: none; font-weight: 700;">${p.name}</a></td>
                                        <td>${p.totalVacancy ?? '—'}</td>
                                        <td>${getQualLabel(p.minQualificationLevel)}</td>
                                        <td>${(p.prerequisite && p.prerequisite.length > 0) ? p.prerequisite.join(', ') : '—'}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>` : ''}
                </div>
            </div>`;
        }

        // SECTION 4: Eligibility & Qualification
        if ((job.qualification && job.qualification.length > 0) || (job.posts && job.posts.length > 0)) {
            html += `
            <div class="section-card">
                <div class="section-header">Eligibility & Qualification</div>
                <div class="section-content">
                    <h4 style="margin-bottom: 15px; font-size: 14px; color: var(--text-muted);">QUALIFICATION SUMMARY</h4>
                    ${(job.qualification || []).map(q => `
                        <div class="qual-card">
                            <span class="qual-badge">LEVEL ${q.level}</span>
                            <span class="qual-name">${q.name}</span>
                            <div class="qual-branches">Branches: ${(!q.branches || q.branches.includes('any')) ? 'Any Branch / Discipline' : q.branches.join(', ')}</div>
                            ${(q.extraConditions || []).map(c => `<div class="warning-row">⚠️ ${c}</div>`).join('')}
                        </div>
                    `).join('')}

                    <!-- Section 4B: Per-Post Accordion -->
                    <div style="margin-top: 25px; border: 1px solid var(--border); border-radius: 8px; overflow: hidden;">
                        ${(job.posts || []).map((p, i) => `
                            <div class="accordion-item" id="post-detail-${i}">
                                <div class="accordion-header">
                                    <span>${p.name} (${p.totalVacancy ?? '—'} Posts)</span>
                                    <span class="chevron">▼</span>
                                </div>
                                <div class="accordion-content">
                                    ${(p.qualification || []).map(q => `
                                        <div class="qual-card" style="border-style: dashed;">
                                            <span class="qual-badge">LEVEL ${q.level}</span>
                                            <span class="qual-name">${q.name}</span>
                                            <div class="qual-branches">Branches: ${(!q.branches || q.branches.includes('any')) ? 'Any Branch / Discipline' : q.branches.join(', ')}</div>
                                            ${(q.extraConditions || []).map(c => `<div class="warning-row">⚠️ ${c}</div>`).join('')}
                                        </div>
                                    `).join('')}
                                    
                                    ${(p.categoryWiseVacancy && Object.values(p.categoryWiseVacancy).some(v => v !== null)) ? `
                                        <div class="table-wrapper" style="margin-top: 10px;">
                                            <table style="font-size: 11px;">
                                                <thead><tr><th>Gen</th><th>EWS</th><th>OBC</th><th>SC</th><th>ST</th><th>PWD</th></tr></thead>
                                                <tbody>
                                                    <tr>
                                                        <td>${p.categoryWiseVacancy.general ?? '—'}</td>
                                                        <td>${p.categoryWiseVacancy.ews ?? '—'}</td>
                                                        <td>${p.categoryWiseVacancy.obc ?? '—'}</td>
                                                        <td>${p.categoryWiseVacancy.sc ?? '—'}</td>
                                                        <td>${p.categoryWiseVacancy.st ?? '—'}</td>
                                                        <td>${p.categoryWiseVacancy.pwd ?? '—'}</td>
                                                    </tr>
                                                </tbody>
                                            </table>
                                        </div>
                                    ` : ''}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            </div>`;
        }

        // SECTION 5: Age Limit
        if (job.ageLimit) {
            const relax = job.ageLimit.relaxation || {};
            const hasRelax = Object.values(relax).some(v => v !== null);

            html += `
            <div class="section-card">
                <div class="section-header">Age Limit</div>
                <div class="section-content">
                    <div class="table-wrapper">
                        <table style="max-width: 400px;">
                            <tr><td><strong>Minimum Age:</strong></td><td>${job.ageLimit.min ?? '—'} Years</td></tr>
                            <tr><td><strong>Maximum Age:</strong></td><td>${job.ageLimit.max ?? '—'} Years</td></tr>
                            <tr><td><strong>Age as on:</strong></td><td>${formatDate(job.ageLimit.asOnDate)}</td></tr>
                        </table>
                    </div>

                    ${hasRelax ? `
                        <div style="margin-top: 15px;">
                            <h4 style="font-size: 12px; margin-bottom: 8px;">AGE RELAXATION</h4>
                            <div class="table-wrapper">
                                <table class="table-striped">
                                    <thead><tr><th>Category</th><th>Relaxation</th></tr></thead>
                                    <tbody>
                                        ${relax.obc ? `<tr><td>OBC</td><td>${relax.obc} Years</td></tr>` : ''}
                                        ${(relax.sc || relax.st) ? `<tr><td>SC / ST</td><td>${relax.sc || relax.st} Years</td></tr>` : ''}
                                        ${relax.pwd ? `<tr><td>PWD</td><td>${relax.pwd} Years</td></tr>` : ''}
                                        ${relax.exServiceman ? `<tr><td>Ex-Serviceman</td><td>${relax.exServiceman} Years</td></tr>` : ''}
                                        ${relax.female ? `<tr><td>Female</td><td>${relax.female} Years</td></tr>` : ''}
                                    </tbody>
                                </table>
                            </div>
                            <p style="font-size: 11px; color: var(--text-muted); margin-top: 10px;">* Age relaxation as per government rules. Refer to official notification for details.</p>
                        </div>
                    ` : ''}
                </div>
            </div>`;
        }

            const fee = job.applicationFee;
            // Group identical fees
            const feeGroups = {};
            const categories = {
                general: "General", obc: "OBC", ews: "EWS",
                sc: "SC", st: "ST", pwd: "PWD (Divyang)", 
                female: "Female", exServiceman: "Ex-Serviceman"
            };

            Object.keys(categories).forEach(cat => {
                const f = fee[cat];
                if (f !== null && f !== undefined) {
                    if (!feeGroups[f]) feeGroups[f] = [];
                    feeGroups[f].push(categories[cat]);
                }
            });

            const uniqueFees = Object.keys(feeGroups);
            let feeRowsHtml = "";

            if (uniqueFees.length === 1 && Object.keys(categories).every(c => fee[c] !== null)) {
                feeRowsHtml = `<tr><td>All Categories</td><td>₹${uniqueFees[0]}</td></tr>`;
            } else {
                feeRowsHtml = uniqueFees.map(f => `
                    <tr>
                        <td>${feeGroups[f].join(' / ')}</td>
                        <td>${f === "0" ? 'Exempted' : `₹${f}`}</td>
                    </tr>
                `).join('');
            }

            html += `
            <div class="section-card">
                <div class="section-header">Application Fee</div>
                <div class="section-content">
                    <div class="table-wrapper">
                        <table class="table-striped">

                    </div>
                    ${(fee.paymentMode && fee.paymentMode.length > 0) ? `

                        </div>
                    ` : ''}
                </div>
            </div>`;
        }

        // SECTION 7: Selection Process
        html += `
        <div class="section-card">
            <div class="section-header">Selection Process</div>

                        `).join('')}
                    </div>
                ` : '<p>Selection process not announced yet.</p>'}
            </div>
        </div>`;

        // SECTION 8: How to Apply
        html += `
        <div class="section-card">
            <div class="section-header">How to Apply</div>
            <div class="section-content">
                ${(job.applicationProcess && job.applicationProcess.length > 0) ? `
                    <div class="app-steps-list">
                        ${job.applicationProcess.map((step, i) => `
                            <div class="app-step">
                                <div class="step-num">${String(i + 1).padStart(2, '0')}</div>

                            </div>
                        `).join('')}
                    </div>
                ` : '<p>Refer to the official notification for application instructions.</p>'}
            </div>
        </div>`;

        // SECTION 9: Other Details
        html += `
        <div class="section-card">
            <div class="section-header">Other Details</div>
            <div class="section-content">
                <div class="info-grid">
                    <div class="table-wrapper">
                        <table>

                            <tr><td><strong>Source</strong></td><td>${job.source || '—'}</td></tr>
                        </table>
                    </div>
                </div>
            </div>
        </div>`;

        // SECTION 10: Footer
        html += `
        <div class="footer-slim">
            <p>Data sourced from official notification. Always verify details from the official website before applying.</p>
            <p style="margin-top: 5px;">Last updated: ${formatDateTime(job.updatedAt)}</p>

                ${job.notificationPdfLink ? `<a href="${job.notificationPdfLink}" target="_blank">Download notification</a> | ` : ''}
                ${job.officialWebsite ? `<a href="${job.officialWebsite}" target="_blank">Official Website</a>` : ''}
            </div>
        </div>
        </div>`;

        container.innerHTML = html;

        document.querySelectorAll('.accordion-header').forEach(header => {
            header.addEventListener('click', () => {
                const item = header.parentElement;
                item.classList.toggle('active');
            });
        });
    }
